name: Daily AI Market Reports

on:
  schedule:
    # 毎日 00:00, 08:00, 16:00 UTC (日本時間 09:00, 17:00, 01:00) に実行
    - cron: '0 0,8,16 * * *'
  workflow_dispatch:
    inputs:
      force_date:
        description: 'YYYY-MM-DD（空欄=今日）'
        required: false
        default: ''
      genres:
        description: 'カンマ区切り。例: fx,stocks,crypto'
        required: false
        default: 'fx,stocks,crypto'

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python dependencies
        run: pip install yfinance mplfinance pandas

      - name: Install dependencies
        run: npm ci

      - name: Environment Diagnostics
        run: |
          echo "Node version: $(node -v)"
          echo "Python version: $(python3 --version)"
          echo "Checking environment variables..."
          if [ -z "${{ secrets.GEMINI_API_KEY }}" ]; then echo "❌ GEMINI_API_KEY is missing"; else echo "✅ GEMINI_API_KEY is set"; fi
          if [ -z "${{ secrets.OPENROUTER_API_KEY }}" ]; then echo "❌ OPENROUTER_API_KEY is missing"; else echo "✅ OPENROUTER_API_KEY is set"; fi
          if [ -z "${{ secrets.MAKE_WEBHOOK_URL }}" ]; then echo "❌ MAKE_WEBHOOK_URL is missing"; else echo "✅ MAKE_WEBHOOK_URL is set"; fi
          if [ -z "${{ secrets.TWELVE_DATA_API_KEY }}" ]; then echo "❌ TWELVE_DATA_API_KEY is missing"; else echo "✅ TWELVE_DATA_API_KEY is set"; fi
          if [ -z "${{ secrets.GH_PAT }}" ]; then echo "❌ GH_PAT is missing"; else echo "✅ GH_PAT is set"; fi

      - name: Generate Reports
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          FORCE_DATE: ${{ github.event.inputs.force_date }}
          GENRES: ${{ github.event.inputs.genres }}
        run: node scripts/generate-reports.js

      - name: List Generated Files
        run: ls -R content/reports/

      - name: Post to Facebook
        env:
          MAKE_WEBHOOK_URL: ${{ secrets.MAKE_WEBHOOK_URL }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node scripts/post-to-facebook.js

      - name: Evaluate Results
        env:
          TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}
        run: node scripts/evaluate-results.js

      - name: Commit and Push changes
        run: |
          git config --global user.name "Synapse AI Bot"
          git config --global user.email "bot@synapsecapital.net"
          git add content/reports/*.md content/latest-signals.json content/latest-signals-ja.json content/latest-signals-en.json content/reports-index.json public/images/*.png
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "chore: automated daily market report update [skip ci]"
            git pull --rebase origin main
            git push origin main
          else
            echo "No changes to commit"
          fi

      - name: Build and Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "⚠️ Cloudflare credentials not set. Skipping deploy."
            exit 0
          fi
          echo "Building for Cloudflare..."
          npm run build:cf
          echo "Deploying to Cloudflare Pages..."
          npx wrangler pages deploy deploy --project-name synapse-capital --branch main --commit-dirty=true

      - name: Notify on failure
        if: failure()
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: node scripts/notify.js "[daily-reports 失敗] run_id=${{ github.run_id }} ref=${{ github.ref_name }}"
