name: Daily AI Market Reports

on:
  schedule:
    # 毎日 00:00, 08:00, 16:00 UTC (日本時間 09:00, 17:00, 01:00) に実行
    - cron: '0 0,8,16 * * *'
  workflow_dispatch: # 手動実行用

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python dependencies
        run: pip install yfinance mplfinance pandas

      - name: Install Node dependencies
        run: npm install

      - name: Generate Reports
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/generate-reports.js

      - name: Post to Facebook
        env:
          MAKE_WEBHOOK_URL: ${{ secrets.MAKE_WEBHOOK_URL }}
        run: node scripts/post-to-facebook.js

      - name: Commit and Push changes
        run: |
          git config --global user.name "Synapse AI Bot"
          git config --global user.email "bot@synapsecapital.net"
          git add content/reports/*.md content/latest-signals.json public/images/*.png
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: automated daily market report update" && git push origin main)

      # Cloudflare Pages は GitHub 連携されている前提で、Push 時に自動ビルドが走ります。
