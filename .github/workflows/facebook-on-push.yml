name: Facebook Auto-Post on Git Push

on:
  push:
    branches:
      - main
    paths:
      - 'content/reports/**.md'
  workflow_dispatch: # Enable manual trigger if needed

jobs:
  facebook-post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2 # Fetch the last 2 commits to see what changed

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Identify new reports and post to Facebook
        env:
          MAKE_WEBHOOK_URL: ${{ secrets.MAKE_WEBHOOK_URL }}
        run: node scripts/post-to-facebook.js
